<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Centralised Messaging Workflow</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #f5f4f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      min-height: 100vh;
      padding: 40px 20px;
      color: #1a1a18;
    }

    h1 {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 8px;
      color: #1a1a18;
    }
    p.sub {
      font-size: 13px;
      color: #73726c;
      margin-bottom: 28px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      border: 1px solid rgba(0,0,0,0.08);
      padding: 24px;
      max-width: 740px;
      width: 100%;
    }

    svg { width: 100%; height: auto; display: block; }

    /* Color ramps */
    .c-gray   rect, .c-gray   circle { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-purple rect, .c-purple circle { fill: #EEEDFE; stroke: #534AB7; }
    .c-teal   rect, .c-teal   circle { fill: #E1F5EE; stroke: #0F6E56; }
    .c-blue   rect, .c-blue   circle { fill: #E6F1FB; stroke: #185FA5; }
    .c-amber  rect, .c-amber  circle { fill: #FAEEDA; stroke: #854F0B; }
    .c-coral  rect, .c-coral  circle { fill: #FAECE7; stroke: #993C1D; }

    .c-gray   text { fill: #444441; }
    .c-purple text { fill: #3C3489; }
    .c-teal   text { fill: #085041; }
    .c-blue   text { fill: #0C447C; }
    .c-amber  text { fill: #633806; }
    .c-coral  text { fill: #712B13; }

    .node { cursor: pointer; }
    .node:hover rect { opacity: 0.85; }

    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    .th { font-size: 14px; font-weight: 500; fill: #1a1a18; }
    .ts { font-size: 12px; font-weight: 400; fill: #73726c; }

    .arr {
      fill: none;
      stroke: #888780;
      stroke-width: 1.2;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #1c1c1a; color: #e0dfd6; }
      .card { background: #242422; border-color: rgba(255,255,255,0.08); }
      h1 { color: #e0dfd6; }

      .c-gray   rect { fill: #444441; stroke: #B4B2A9; }
      .c-purple rect { fill: #3C3489; stroke: #AFA9EC; }
      .c-teal   rect { fill: #085041; stroke: #5DCAA5; }
      .c-blue   rect { fill: #0C447C; stroke: #85B7EB; }
      .c-amber  rect { fill: #633806; stroke: #EF9F27; }
      .c-coral  rect { fill: #712B13; stroke: #F0997B; }

      .c-gray   text { fill: #D3D1C7; }
      .c-purple text { fill: #CECBF6; }
      .c-teal   text { fill: #9FE1CB; }
      .c-blue   text { fill: #B5D4F4; }
      .c-amber  text { fill: #FAC775; }
      .c-coral  text { fill: #F5C4B3; }

      .th { fill: #e0dfd6; }
      .ts { fill: #9c9a92; }
      .arr { stroke: #9c9a92; }
    }
  </style>
</head>
<body>

  <h1>Centralised Messaging Workflow</h1>
  <p class="sub">AI-powered guest messaging — from any channel to personalised action</p>

  <div class="card">
    <svg viewBox="0 0 680 700" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>

      <!-- Platforms -->
      <g class="node c-gray">
        <rect x="30" y="30" width="100" height="44" rx="8" stroke-width="0.5"/>
        <text class="th" x="80" y="52" text-anchor="middle" dominant-baseline="central">WhatsApp</text>
      </g>
      <g class="node c-gray">
        <rect x="155" y="30" width="100" height="44" rx="8" stroke-width="0.5"/>
        <text class="th" x="205" y="52" text-anchor="middle" dominant-baseline="central">Email</text>
      </g>
      <g class="node c-gray">
        <rect x="280" y="30" width="100" height="44" rx="8" stroke-width="0.5"/>
        <text class="th" x="330" y="52" text-anchor="middle" dominant-baseline="central">Instagram</text>
      </g>
      <g class="node c-gray">
        <rect x="405" y="30" width="120" height="44" rx="8" stroke-width="0.5"/>
        <text class="th" x="465" y="52" text-anchor="middle" dominant-baseline="central">FB Messenger</text>
      </g>
      <g class="node c-gray">
        <rect x="548" y="30" width="100" height="44" rx="8" stroke-width="0.5"/>
        <text class="th" x="598" y="52" text-anchor="middle" dominant-baseline="central">SMS / more</text>
      </g>

      <!-- Platform → Centralised arrows -->
      <line x1="80"  y1="74" x2="280" y2="148" class="arr" stroke-opacity="0.4" marker-end="url(#arrow)"/>
      <line x1="205" y1="74" x2="295" y2="148" class="arr" stroke-opacity="0.4" marker-end="url(#arrow)"/>
      <line x1="330" y1="74" x2="330" y2="148" class="arr" stroke-opacity="0.4" marker-end="url(#arrow)"/>
      <line x1="465" y1="74" x2="370" y2="148" class="arr" stroke-opacity="0.4" marker-end="url(#arrow)"/>
      <line x1="598" y1="74" x2="385" y2="148" class="arr" stroke-opacity="0.4" marker-end="url(#arrow)"/>

      <!-- Centralised Messenger -->
      <g class="node c-purple">
        <rect x="200" y="148" width="260" height="60" rx="10" stroke-width="0.5"/>
        <text class="th" x="330" y="172" text-anchor="middle" dominant-baseline="central">Centralised messenger</text>
        <text class="ts" x="330" y="192" text-anchor="middle" dominant-baseline="central">Unified inbox for all channels</text>
      </g>

      <line x1="330" y1="208" x2="330" y2="268" class="arr" stroke-opacity="0.5" marker-end="url(#arrow)"/>

      <!-- Addin Web App -->
      <g class="node c-teal">
        <rect x="200" y="268" width="260" height="60" rx="10" stroke-width="0.5"/>
        <text class="th" x="330" y="290" text-anchor="middle" dominant-baseline="central">Addin web app</text>
        <text class="ts" x="330" y="310" text-anchor="middle" dominant-baseline="central">Orchestration &amp; automation hub</text>
      </g>

      <!-- Addin → Cloudbeds -->
      <line x1="200" y1="298" x2="120" y2="370" class="arr" stroke-opacity="0.4" marker-end="url(#arrow)"/>
      <!-- Cloudbeds → Addin -->
      <line x1="160" y1="360" x2="248" y2="330" class="arr" stroke-opacity="0.35" marker-end="url(#arrow)"/>

      <!-- Addin → AI -->
      <line x1="460" y1="298" x2="545" y2="370" class="arr" stroke-opacity="0.4" marker-end="url(#arrow)"/>
      <!-- AI → Addin -->
      <line x1="545" y1="390" x2="464" y2="330" class="arr" stroke-opacity="0.35" marker-end="url(#arrow)"/>

      <!-- Cloudbeds PMS -->
      <g class="node c-blue">
        <rect x="30" y="360" width="200" height="60" rx="10" stroke-width="0.5"/>
        <text class="th" x="130" y="382" text-anchor="middle" dominant-baseline="central">Cloudbeds PMS</text>
        <text class="ts" x="130" y="402" text-anchor="middle" dominant-baseline="central">Guest &amp; reservation CRM data</text>
      </g>

      <!-- AI Engine -->
      <g class="node c-amber">
        <rect x="450" y="360" width="200" height="60" rx="10" stroke-width="0.5"/>
        <text class="th" x="550" y="382" text-anchor="middle" dominant-baseline="central">AI engine</text>
        <text class="ts" x="550" y="402" text-anchor="middle" dominant-baseline="central">Analyse dialogue + CRM data</text>
      </g>

      <!-- Addin → Output -->
      <line x1="330" y1="328" x2="330" y2="490" class="arr" stroke-opacity="0.5" marker-end="url(#arrow)"/>

      <!-- Personalised Message -->
      <g class="node c-coral">
        <rect x="100" y="490" width="200" height="60" rx="10" stroke-width="0.5"/>
        <text class="th" x="200" y="512" text-anchor="middle" dominant-baseline="central">Personalised message</text>
        <text class="ts" x="200" y="532" text-anchor="middle" dominant-baseline="central">Tailored deal or offer</text>
      </g>

      <!-- Automated Action -->
      <g class="node c-coral">
        <rect x="380" y="490" width="200" height="60" rx="10" stroke-width="0.5"/>
        <text class="th" x="480" y="512" text-anchor="middle" dominant-baseline="central">Automated action</text>
        <text class="ts" x="480" y="532" text-anchor="middle" dominant-baseline="central">Call-back trigger or upsell</text>
      </g>

      <!-- Return dashed arrows to centralised messenger -->
      <path d="M200 550 L200 620 L330 620 L330 560" fill="none" stroke="#888780" stroke-opacity="0.35" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
      <path d="M480 550 L480 630 L340 630 L340 560" fill="none" stroke="#888780" stroke-opacity="0.35" stroke-width="1.2" stroke-dasharray="5 4" marker-end="url(#arrow)"/>

      <text class="ts" x="330" y="650" text-anchor="middle">Sent back out via centralised messenger to guest's channel</text>

      <!-- Legend -->
      <rect x="30" y="672" width="12" height="12" rx="3" fill="none" stroke="#888780" stroke-opacity="0.5" stroke-dasharray="4 3"/>
      <text class="ts" x="48" y="682">Automated outbound send</text>
    </svg>
  </div>

</body>
</html>
